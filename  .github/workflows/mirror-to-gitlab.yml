name: Mirror to Gitlab

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}

      - name: Ensure Framagit is known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan framagit.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Add Framagit remote
        run: |
          git remote add framagit git@framagit.org:bvalero/intros-with-shepherdjs.git

      - name: Push branches to Framagit
        run: |
          git push framagit --all
          git push framagit --tags
          # Pour miroir exact (attention : remplace l'état distant)
          # git push --mirror framagit
